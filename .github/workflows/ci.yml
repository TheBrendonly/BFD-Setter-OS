# CI: runs the repo's test suites on every push + PR.
#
# Runs on the GitHub mirror (github remote, TheBrendonly/BFD-Setter-OS; renamed
# from 1prompt-os in the 2026-07-10 branding purge) because its runners are free
# and reachable; the `origin` Forgejo remote is Tailscale-only.
# This file is Forgejo/Gitea-Actions compatible (same YAML schema), so it will
# also run unchanged if a self-hosted runner is later enabled on Forgejo.
#
# Two test runtimes (counts verified 2026-07-20):
#   - Node (>=22.6 for --experimental-strip-types) over the 23 test files in trigger/_shared/ (183 tests)
#   - Deno over the 35 edge-function test files in frontend/supabase/functions/ (262 tests)
#
# The `test` job (node + deno) is the real gate. The `report` job below runs the
# previously-uncovered surfaces (frontend unit tests, tsc typecheck, eslint) as
# NON-BLOCKING reporting (continue-on-error) so the ~17-error typecheck baseline
# and the lint baseline are VISIBLE in the Actions log and cannot silently grow,
# without failing the workflow on the pre-existing debt. Nothing here gates merges
# to main (no branch protection); flipping report to blocking is a later decision
# once its baselines are driven to zero.
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (node + deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Node tests (trigger/_shared)
        run: node --experimental-strip-types --test trigger/_shared/*.test.ts

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno tests (frontend/supabase/functions)
        run: deno test --no-check frontend/supabase/functions/

  report:
    name: report (frontend tests + typecheck + lint, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Frontend unit tests (frontend/src/lib)
        run: npm run test:frontend
        continue-on-error: true

      - name: Typecheck (frontend/src via tsconfig.app.json; baseline ~17 errors 2026-07-21)
        working-directory: frontend
        run: npx tsc --noEmit -p tsconfig.app.json
        continue-on-error: true

      - name: Lint (frontend; pre-existing baseline, non-blocking)
        working-directory: frontend
        run: npm run lint
        continue-on-error: true
